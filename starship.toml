# Starship Prompt Configuration for VS Code Workspace Manager
# Copy to ~/.config/starship.toml (Linux/macOS) or ~/.starship.toml (Windows)
# Docs: https://starship.rs/config/

# ── Format ─────────────────────────────────────
format = """
[](#9A348E)\
$os\
$username\
[](bg:#DA627D fg:#9A348E)\
$directory\
[](fg:#DA627D bg:#FCA17D)\
$git_branch\
$git_status\
[](fg:#FCA17D bg:#86BBD8)\
$python\
$nodejs\
$rust\
$golang\
[](fg:#86BBD8 bg:#06969A)\
$cmd_duration\
[](fg:#06969A)\
$line_break\
$character\
"""

# ── Prompt character ───────────────────────────
[character]
success_symbol = "[▶](bold green)"
error_symbol = "[▶](bold red)"

# ── Directory ──────────────────────────────────
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bg:#DA627D fg:black"

# ── Git branch ─────────────────────────────────
[git_branch]
format = "[$symbol$branch]($style)"
style = "bg:#FCA17D fg:black"
symbol = " "

[git_status]
style = "bg:#FCA17D fg:black"
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "📦"
modified = "!"
staged = "+"
renamed = "→"
deleted = "✗"

# ── Language modules ───────────────────────────
[python]
symbol = "🐍 "
style = "bg:#86BBD8 fg:black"
format = "[$symbol$version]($style)"

[nodejs]
symbol = "⬢ "
style = "bg:#86BBD8 fg:black"
format = "[$symbol$version]($style)"

[rust]
symbol = "🦀 "
style = "bg:#86BBD8 fg:black"
format = "[$symbol$version]($style)"

[golang]
symbol = "🐹 "
style = "bg:#86BBD8 fg:black"
format = "[$symbol$version]($style)"

# ── Command duration ───────────────────────────
[cmd_duration]
min_time = 2000
format = "[ ⚡$duration ]($style)"
style = "bg:#06969A fg:black"

# ── OS module ──────────────────────────────────
[os]
format = "[$symbol]($style)"
style = "bg:#9A348E fg:black"
disabled = false

[os.symbols]
Windows = "⊞"
Linux = "🐧"
Macos = "🍎"
