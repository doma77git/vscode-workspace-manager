name: Validate Templates

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  json-lint:
    name: JSON Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Validate .json files
        run: |
          FAIL=0
          while IFS= read -r f; do
            echo "Validating: $f"
            jq . "$f" > /dev/null || { echo "INVALID JSON: $f"; FAIL=1; }
          done < <(find . -name "*.json" -not -path "./.git/*")
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Validate .code-workspace files
        run: |
          FAIL=0
          while IFS= read -r f; do
            echo "Validating: $f"
            jq . "$f" > /dev/null || { echo "INVALID JSON: $f"; FAIL=1; }
          done < <(find . -name "*.code-workspace" -not -path "./.git/*")
          [ "$FAIL" -eq 0 ] || exit 1

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Scan for secrets
        run: |
          echo "Scanning for secret patterns..."
          FOUND=0

          while IFS= read -r f; do
            if grep -E -n -i '(password|secret|api[_-]?key|token|private_key)' "$f" 2>/dev/null; then
              echo "::warning file=$f::Potential secret found"
              FOUND=1
            fi
          done < <(find . -type f \
            -not -path "./.git/*" \
            -not -path "./.github/*" \
            -not -name "*.lock" \
            -not -name "*.exe" \
            -not -name "*.dll" \
            -not -name "*.md" \
            -not -name "*.txt" \
            -not -name "*.ps1" \
            -not -name "*.sh" \
            -not -name "Makefile" \
            -not -name ".gitignore" \
            -not -name ".editorconfig")

          if [ "$FOUND" -eq 1 ]; then
            echo "============================================"
            echo "  SECRETS DETECTED!"
            echo "============================================"
            echo "  Remove secrets before committing."
            echo "  If these are false positives, add the file"
            echo "  to .gitignore or annotate with a comment."
            exit 1
          fi

          echo "No secrets detected."

  structure-check:
    name: Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check required directories
        run: |
          for dir in templates profiles meta scripts docs prompts skills .github/workflows .github/ISSUE_TEMPLATE; do
            if [ ! -d "$dir" ]; then
              echo "MISSING: $dir/"
              exit 1
            fi
            echo "OK: $dir/"
          done

      - name: Check required files
        run: |
          for file in .gitignore README.md deploy-instructions.txt .editorconfig SECURITY.md CONTRIBUTING.md LICENSE; do
            if [ ! -f "$file" ]; then
              echo "MISSING: $file"
              exit 1
            fi
            echo "OK: $file"
          done

      - name: Check required docs
        run: |
          for file in docs/ARCHITECTURE.md docs/TERMINAL.md docs/WORKSPACE-TRUST.md docs/DEEPSEEK-RECOMMENDATIONS.md; do
            if [ ! -f "$file" ]; then
              echo "MISSING: $file"
              exit 1
            fi
            echo "OK: $file"
          done

      - name: Check run scripts
        run: |
          for file in scripts/Run-Validate.ps1 scripts/Run-Checks.ps1; do
            if [ ! -f "$file" ]; then
              echo "MISSING: $file"
              exit 1
            fi
            echo "OK: $file"
          done

      - name: Check PR and issue templates
        run: |
          for file in .github/PULL_REQUEST_TEMPLATE.md .github/ISSUE_TEMPLATE/bug_report.md .github/ISSUE_TEMPLATE/feature_request.md; do
            if [ ! -f "$file" ]; then
              echo "MISSING: $file"
              exit 1
            fi
            echo "OK: $file"
          done

      - name: Validate terminal profiles in workspace
        run: |
          if jq -e '.settings."terminal.integrated.profiles.windows"' templates/sample-project.code-workspace > /dev/null 2>&1; then
            PROFILE_COUNT=$(jq '.settings."terminal.integrated.profiles.windows" | length' templates/sample-project.code-workspace)
            echo "OK: $PROFILE_COUNT terminal profiles configured"
          else
            echo "WARNING: No terminal profiles found in sample workspace"
          fi

      - name: Check task definitions
        run: |
          TASK_COUNT=$(jq '.tasks.tasks | length' templates/sample-project.code-workspace)
          echo "OK: $TASK_COUNT tasks defined in sample workspace"
